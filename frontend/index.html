<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Challenge Tracker</title>
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="js/components/challenge/challenge-form.css">
</head>
<body>
  <!-- Header / Navigation -->
  <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--tg-theme-secondary-bg-color);">
    <div style="display: flex; align-items: center; gap: 8px;">
      <div style="width: 32px; height: 32px; background-color: var(--accent-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;">🏆</div>
      <span style="font-size: 18px; font-weight: 700; color: var(--tg-theme-link-color);">Workout Challenge</span>
    </div>
    <div>
      <span id="user-badge" style="background-color: var(--tg-theme-secondary-bg-color); padding: 4px 10px; border-radius: 20px; font-size: 12px; color: var(--tg-theme-hint-color);">default_user_1</span>
    </div>
  </header>

  <!-- SPA Target Container -->
  <main id="app" class="app-container"></main>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Bootstrapping Script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
