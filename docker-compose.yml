version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: workout-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-workout_tracker}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workout-app
    restart: always
    ports:
      - "80:8080"
    environment:
      - DATABASE_DSN=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-workout_tracker}?sslmode=disable
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - db-network

networks:
  db-network:
    driver: bridge

volumes:
  pgdata:
